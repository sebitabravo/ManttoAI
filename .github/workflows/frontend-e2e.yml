name: Frontend E2E

on:
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read

concurrency:
  group: frontend-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Frontend — E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect Playwright setup
        id: playwright_check
        working-directory: .
        run: |
          if [ ! -f frontend/package.json ] || [ ! -f frontend/package-lock.json ] || [ ! -d frontend/src ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "reason=frontend-not-ready" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if node -e "const pkg=require('./frontend/package.json'); process.exit(pkg.scripts?.['test:e2e'] ? 0 : 1)"; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "reason=script-test-e2e" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -f frontend/playwright.config.ts ] || [ -f frontend/playwright.config.js ] || [ -f frontend/playwright.config.mjs ] || [ -f frontend/playwright.config.cjs ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "reason=config-detected" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "reason=playwright-not-configured" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip until Playwright is configured
        if: steps.playwright_check.outputs.present != 'true'
        working-directory: .
        run: |
          echo "::warning::Playwright E2E skipped: ${{ steps.playwright_check.outputs.reason }}"

      - name: Set up Node.js
        if: steps.playwright_check.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: steps.playwright_check.outputs.present == 'true'
        run: npm ci

      - name: Build frontend for preview server
        if: steps.playwright_check.outputs.present == 'true'
        env:
          CI: "true"
        run: npm run build

      - name: Install Playwright browser
        if: steps.playwright_check.outputs.present == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests via npm script
        if: steps.playwright_check.outputs.present == 'true' && steps.playwright_check.outputs.reason == 'script-test-e2e'
        env:
          CI: "true"
        run: npm run test:e2e

      - name: Run Playwright tests via default command
        if: steps.playwright_check.outputs.present == 'true' && steps.playwright_check.outputs.reason == 'config-detected'
        env:
          CI: "true"
        run: npx playwright test

      - name: Upload Playwright artifacts on failure
        if: failure() && steps.playwright_check.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
          retention-days: 7
