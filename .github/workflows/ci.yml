name: CI

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: manttoai_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect backend project
        id: backend_check
        working-directory: .
        run: |
          if [ -f backend/requirements.txt ] && [ -d backend/app ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip until backend exists
        if: steps.backend_check.outputs.present != 'true'
        working-directory: .
        run: |
          echo "::warning::Backend folder is not initialized yet. Skipping backend CI."

      - name: Set up Python
        if: steps.backend_check.outputs.present == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        if: steps.backend_check.outputs.present == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black ruff pytest pytest-cov httpx pymysql

      - name: Lint with Ruff
        if: steps.backend_check.outputs.present == 'true'
        run: ruff check app/ --output-format=github

      - name: Check formatting with Black
        if: steps.backend_check.outputs.present == 'true'
        run: black --check app/

      - name: Run pytest
        if: steps.backend_check.outputs.present == 'true'
        env:
          DATABASE_URL: mysql+pymysql://root:test_password@127.0.0.1:3306/manttoai_test
          SECRET_KEY: test-secret-key-ci
          MQTT_BROKER_HOST: localhost
          MQTT_BROKER_PORT: "1883"
          SMTP_HOST: ""
          SMTP_PORT: "587"
          SMTP_USER: ""
          SMTP_PASSWORD: ""
        run: pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=60

  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect frontend project
        id: frontend_check
        working-directory: .
        run: |
          if [ -f frontend/package.json ] && [ -f frontend/package-lock.json ] && [ -d frontend/src ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip until frontend exists
        if: steps.frontend_check.outputs.present != 'true'
        working-directory: .
        run: |
          echo "::warning::Frontend folder is not initialized yet. Skipping frontend CI."

      - name: Set up Node.js
        if: steps.frontend_check.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: steps.frontend_check.outputs.present == 'true'
        run: npm ci

      - name: Lint with ESLint
        if: steps.frontend_check.outputs.present == 'true'
        env:
          CI: "true"
        run: npm run lint

      - name: Build production bundle
        if: steps.frontend_check.outputs.present == 'true'
        env:
          CI: "true"
        run: npm run build
