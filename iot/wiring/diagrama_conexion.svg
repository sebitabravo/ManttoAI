<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Diagrama de conexión ESP32 con DHT22 y MPU-6050</title>
  <desc id="desc">Conexión de GPIO4 al DHT22 DATA y bus I2C GPIO21/GPIO22 al MPU-6050, con 3V3 y GND compartidos.</desc>

  <rect x="0" y="0" width="1100" height="620" fill="#f8fafc"/>

  <rect x="420" y="120" width="300" height="360" rx="14" fill="#1e293b"/>
  <text x="570" y="160" text-anchor="middle" font-family="Inter, Arial" font-size="24" fill="#ffffff">ESP32 DevKit v1</text>

  <rect x="80" y="170" width="220" height="220" rx="12" fill="#0f766e"/>
  <text x="190" y="210" text-anchor="middle" font-family="Inter, Arial" font-size="22" fill="#ecfeff">DHT22</text>
  <text x="100" y="250" font-family="Inter, Arial" font-size="16" fill="#ecfeff">Pin 1: VCC (3V3)</text>
  <text x="100" y="280" font-family="Inter, Arial" font-size="16" fill="#ecfeff">Pin 2: DATA → GPIO4</text>
  <text x="100" y="310" font-family="Inter, Arial" font-size="16" fill="#ecfeff">Pin 3: NC</text>
  <text x="100" y="340" font-family="Inter, Arial" font-size="16" fill="#ecfeff">Pin 4: GND</text>
  <text x="100" y="370" font-family="Inter, Arial" font-size="13" fill="#ccfbf1">Pull-up 10kΩ entre DATA y 3V3</text>

  <rect x="800" y="170" width="220" height="220" rx="12" fill="#1d4ed8"/>
  <text x="910" y="210" text-anchor="middle" font-family="Inter, Arial" font-size="22" fill="#eff6ff">MPU-6050</text>
  <text x="820" y="250" font-family="Inter, Arial" font-size="16" fill="#eff6ff">VCC → 3V3</text>
  <text x="820" y="280" font-family="Inter, Arial" font-size="16" fill="#eff6ff">GND → GND</text>
  <text x="820" y="310" font-family="Inter, Arial" font-size="16" fill="#eff6ff">SDA → GPIO21</text>
  <text x="820" y="340" font-family="Inter, Arial" font-size="16" fill="#eff6ff">SCL → GPIO22</text>
  <text x="820" y="370" font-family="Inter, Arial" font-size="13" fill="#dbeafe">INT no utilizado en MVP</text>

  <line x1="300" y1="280" x2="420" y2="280" stroke="#ef4444" stroke-width="4"/>
  <text x="360" y="270" text-anchor="middle" font-family="Inter, Arial" font-size="14" fill="#991b1b">DATA ↔ GPIO4</text>

  <line x1="720" y1="310" x2="800" y2="310" stroke="#7c3aed" stroke-width="4"/>
  <text x="760" y="300" text-anchor="middle" font-family="Inter, Arial" font-size="14" fill="#4c1d95">GPIO21 ↔ SDA</text>

  <line x1="720" y1="340" x2="800" y2="340" stroke="#0284c7" stroke-width="4"/>
  <text x="760" y="360" text-anchor="middle" font-family="Inter, Arial" font-size="14" fill="#0c4a6e">GPIO22 ↔ SCL</text>

  <line x1="300" y1="240" x2="420" y2="240" stroke="#16a34a" stroke-width="4"/>
  <line x1="720" y1="240" x2="800" y2="240" stroke="#16a34a" stroke-width="4"/>
  <text x="570" y="228" text-anchor="middle" font-family="Inter, Arial" font-size="14" fill="#14532d">3V3 compartido</text>

  <line x1="300" y1="360" x2="420" y2="360" stroke="#111827" stroke-width="4"/>
  <line x1="720" y1="360" x2="800" y2="360" stroke="#111827" stroke-width="4"/>
  <text x="570" y="378" text-anchor="middle" font-family="Inter, Arial" font-size="14" fill="#111827">GND común</text>

  <text x="550" y="560" text-anchor="middle" font-family="Inter, Arial" font-size="16" fill="#334155">ManttoAI MVP — Diagrama de conexión físico (versión defensa)</text>
</svg>
