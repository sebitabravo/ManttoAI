# docker-compose.override.yml — Solo desarrollo local
#
# Docker Compose carga este archivo automáticamente junto a docker-compose.yml.
# Añade volúmenes para hot-reload y scripts de utilidad.
#
# NO se usa en Dokploy (en Dokploy solo se indica docker-compose.yml).

services:
  backend:
    build:
      context: ./backend
      args:
        INSTALL_DEV_REQS: "true"
    environment:
      APP_ENV: ${APP_ENV:-development}
      # Valores por defecto para desarrollo local.
      # En producción estas variables DEBEN definirse en el entorno.
      SECRET_KEY: ${SECRET_KEY:-manttoai-dev-secret}
      MQTT_USERNAME: ${MQTT_USERNAME:-manttoai_mqtt}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-manttoai_mqtt_dev}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-manttoai_root}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-manttoai_redis_dev}
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://root:manttoai_root@mysql:3306/manttoai_db}
    volumes:
      - ./backend:/app
      - ./scripts:/scripts:ro
      - ./iot/simulator:/simulator:ro
      # Montar iot/ para que test_mqtt_simulator.py pueda resolver el path relativo
      # desde backend/tests/ → ../../iot/simulator/mqtt_simulator.py
      - ./iot:/iot:ro

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    # Sobreescribir healthcheck para Vite dev server
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:5173 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  mosquitto:
    environment:
      MQTT_USERNAME: ${MQTT_USERNAME:-manttoai_mqtt}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-manttoai_mqtt_dev}
    # El entrypoint genera el passwd desde variables de entorno si no existe.
    # Para usar credenciales pre-generadas, ejecutar: make setup-mqtt-creds

  mysql:
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-manttoai_root}

  redis:
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-manttoai_redis_dev}
