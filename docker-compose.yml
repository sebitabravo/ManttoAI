# docker-compose.yml — Stack unificado para desarrollo local y Dokploy
#
# Uso local:     make up  (carga también docker-compose.override.yml)
# Uso Dokploy:   apuntar a este archivo; Dokploy inyecta red y Traefik labels via UI
#
# Variables de entorno: .env en raíz (Dokploy la genera automáticamente desde pestaña Environment)

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: production
    # En producción nginx hace el proxy al frontend — no se expone puerto directo.
    # En desarrollo local el override agrega ports: ["5173:5173"] para Vite dev server.
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mysql:
    image: mysql:8.0.41
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD no definido en .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-manttoai_db}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"${MYSQL_ROOT_PASSWORD}\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mosquitto:
    build: ./mosquitto
    ports:
      - "1883:1883"
    environment:
      MQTT_USERNAME: ${MQTT_USERNAME:-manttoai_mqtt}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-manttoai_mqtt_dev}
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h 127.0.0.1 -p 1883 -u ${MQTT_USERNAME:-manttoai_mqtt} -P ${MQTT_PASSWORD:-manttoai_mqtt_dev} -t manttoai/healthcheck -n || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:1.27.4-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mysql_data:
